name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g. 1.1.0)'
        required: true

jobs:
  release:
    name: Bump version and create release
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Validate version format
        run: |
          VERSION="${{ github.event.inputs.version }}"
          if ! echo "$VERSION" | grep -qE '^[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "::error::Invalid version format: $VERSION. Use semver (e.g. 1.1.0)"
            exit 1
          fi

      - name: Bump package.json version
        run: npm version "${{ github.event.inputs.version }}" --no-git-tag-version

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add package.json
          git commit -m "chore: release v${{ github.event.inputs.version }}"
          git push origin main

      - name: Delete draft release if present
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          DRAFT_TAG=$(gh release list --json isDraft,tagName \
            --jq '[.[] | select(.isDraft)] | first | .tagName' 2>/dev/null)
          if [ -n "$DRAFT_TAG" ] && [ "$DRAFT_TAG" != "null" ]; then
            gh release delete "$DRAFT_TAG" --yes --cleanup-tag 2>/dev/null || true
          fi

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "v${{ github.event.inputs.version }}" \
            --title "v${{ github.event.inputs.version }}" \
            --generate-notes
